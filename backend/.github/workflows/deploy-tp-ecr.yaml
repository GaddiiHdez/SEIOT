name: Despliege de SEIOT a ECR

on:
  push:
    branches: [ dev ]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 339712759716
  ECR_REPOSITORY_NAME: seiot-backend
  ECR_URI: 339712759716.dkr.ecr.us-east-1.amazonaws.com/seiot-backend
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Contruir y subir imagen a ECR

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY_NAME || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY_NAME

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_URI

      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY_NAME:$IMAGE_TAG .

      - name: Tag Docker image for ECR
        run: docker tag $ECR_REPOSITORY_NAME:$IMAGE_TAG $ECR_URI:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: docker push $ECR_URI:$IMAGE_TAG